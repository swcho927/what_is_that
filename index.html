<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>그 뭐냐 Judge</title>
    <link rel="stylesheet" href="style.css">

    <!-- Firebase CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiHOENDAkOzuzcei8voBAUlHXtGVEoEeA",
            authDomain: "what-is-he.firebaseapp.com",
            projectId: "what-is-he",
            storageBucket: "what-is-he.firebasestorage.app",
            messagingSenderId: "867285358330",
            appId: "1:867285358330:web:3f8960594b1ed3cf959b43",
            measurementId: "G-CMXRC7GVHN"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            const btnLogin    = document.getElementById('btn-login');
            const btnSignup   = document.getElementById('btn-signup');
            const btnLogout   = document.getElementById('btn-logout');
            const userInfo    = document.getElementById('user-info');

            if (user) {
                // 로그인 상태
                btnLogin.style.display  = 'none';
                btnSignup.style.display = 'none';
                btnLogout.style.display = 'inline-block';
                userInfo.textContent    = user.email;
                userInfo.style.display  = 'inline-block';
            } else {
                // 로그아웃 상태
                btnLogin.style.display  = 'inline-block';
                btnSignup.style.display = 'inline-block';
                btnLogout.style.display = 'none';
                userInfo.style.display  = 'none';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-logout').addEventListener('click', () => {
                signOut(auth);
            });
        });
    </script>
</head>
<body>

<!-- 상단 바 -->
<div class="topbar">
    <span class="topbar-brand">그 뭐냐 <span>Judge</span></span>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">그 뭐냐 언어 전용 채점 사이트</span>
    <div style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
        <span id="user-info" style="display:none; font-size:0.82rem; color:var(--text-muted);"></span>
    </div>
</div>

<!-- 홈 메인 -->
<div class="home-wrap">
    <div class="home-hero">
        <h1 class="home-title">그 뭐냐 <span>Judge</span></h1>
        <p class="home-desc">그 뭐냐 언어로 알고리즘 문제를 풀어보세요</p>
        <div class="home-buttons">
            <button class="home-btn home-btn-primary" onclick="location.href='judge.html'">문제 풀기</button>
        </div>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>그 뭐냐 Judge</title>
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyASbcbiXA9SQ3bohWVK7w6xS74Y_RTZhaA",
            authDomain:        "what-is-that-3cc48.firebaseapp.com",
            projectId:         "what-is-that-3cc48",
            storageBucket:     "what-is-that-3cc48.firebasestorage.app",
            messagingSenderId: "745704527046",
            appId:             "1:745704527046:web:1ef97739fdc1348c96b3c7",
            measurementId:     "G-YKN1NFTZRM"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            const userInfo  = document.getElementById('user-info');
            const btnLogin  = document.getElementById('btn-login');
            const btnSignup = document.getElementById('btn-signup');
            const btnLogout = document.getElementById('btn-logout');

            if (user) {
                const displayName = user.displayName || user.email || "유저";
                userInfo.innerHTML = `<a href="profile.html" style="color: var(--blue); text-decoration: none; font-weight: bold; cursor: pointer;">${displayName}</a>`;
                userInfo.style.display = 'inline-block';
                
                if (btnLogin)  btnLogin.style.display = 'none';
                if (btnSignup) btnSignup.style.display = 'none';
                if (btnLogout) btnLogout.style.display = 'inline-block';
            } else {
                userInfo.style.display = 'none';
                userInfo.innerHTML = '';
                
                if (btnLogin)  btnLogin.style.display = 'inline-block';
                if (btnSignup) btnSignup.style.display = 'inline-block';
                if (btnLogout) btnLogout.style.display = 'none';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-logout').addEventListener('click', () => {
                signOut(auth).then(() => location.href = 'index.html');
            });
        });
    </script>
</head>
<body>

<div class="topbar">
    <span class="topbar-brand" onclick="location.href='index.html'" style="cursor:pointer;">그 뭐냐 <span>Judge</span></span>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">그 뭐냐 언어 온라인 채점 사이트</span>
    <button class="topbar-btn" onclick="location.href='ranking.html'" style="margin-left: 10px;">랭킹</button>
    
    <div style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
        <span id="user-info" style="display:none; font-size:0.82rem; color:var(--text-muted);"></span>
        <button id="btn-login"  class="topbar-btn" onclick="location.href='login.html'">로그인</button>
        <button id="btn-signup" class="topbar-btn topbar-btn-primary" onclick="location.href='signup.html'">회원가입</button>
        <button id="btn-logout" class="topbar-btn" style="display:none;">로그아웃</button>
    </div>
</div>

<div class="home-wrap">
    <div class="home-hero">
        <h1 class="home-title">그 뭐냐 <span>Judge</span></h1>
        <p class="home-desc">그 뭐냐 언어로 알고리즘 문제를 풀어보세요</p>
        <div class="home-buttons">
            <button class="home-btn home-btn-primary" onclick="location.href='judge.html'">문제 풀기</button>
        </div>
    </div>
</div>

</body>
</html>

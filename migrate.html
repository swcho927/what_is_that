<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>firstSolves 마이그레이션</title>
    <style>
        body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 40px; }
        button { padding: 12px 24px; background: #238636; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        button:disabled { background: #444; cursor: default; }
        #log { margin-top: 20px; line-height: 1.8; }
        .ok  { color: #3fb950; }
        .skip { color: #8b949e; }
        .err { color: #f85149; }
    </style>
</head>
<body>
<h2>firstSolves 마이그레이션</h2>
<p>로그인된 상태에서 실행하세요. 이미 존재하는 문서는 건너뜁니다.</p>
<button id="btn" onclick="run()">실행</button>
<div id="log"></div>

<script type="module">
import { app }        from './firebase.js';
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const auth = getAuth(app);
const db   = getFirestore(app);

// 현재 전체 문제 목록 (수동 업데이트 필요 시 여기만 수정)
const PROBLEMS = [
    { id: "1000",  title: "A+B" },
    { id: "1001",  title: "A-B" },
    { id: "1002",  title: "A×B" },
    { id: "1003",  title: "A÷B" },
    { id: "1006",  title: "피보나치 수" },
    { id: "2000",  title: "정렬" },
    { id: "3000",  title: "정렬" },
    { id: "9000",  title: "한로로와 싸이" },
    { id: "9001",  title: "파도의 만가" },
    { id: "U0523", title: "십자인대" },
    { id: "U1991", title: "Stalin Sort" },
];

function log(msg, cls) {
    const div = document.getElementById('log');
    const line = document.createElement('div');
    line.className = cls || '';
    line.textContent = msg;
    div.appendChild(line);
}

window.run = async function() {
    const user = auth.currentUser;
    if (!user) { log("❌ 로그인 필요!", "err"); return; }
    document.getElementById('btn').disabled = true;
    log(`✅ 로그인: ${user.email || user.uid}`);
    log(`총 ${PROBLEMS.length}개 문제 처리 시작...`);

    for (const p of PROBLEMS) {
        try {
            const ref = doc(db, "firstSolves", p.id);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                log(`⏭ ${p.id} ${p.title} — 이미 존재, 건너뜀`, "skip");
            } else {
                await setDoc(ref, {
                    problemId:    p.id,
                    problemTitle: p.title,
                    nickname:     null,
                    uid:          user.uid,
                    solvedAt:     serverTimestamp()
                });
                log(`✅ ${p.id} ${p.title} — 생성 완료`, "ok");
            }
        } catch(e) {
            log(`❌ ${p.id} ${p.title} — 실패: ${e.message}`, "err");
        }
    }
    log("--- 완료! 이 파일은 삭제해도 됩니다 ---");
};

onAuthStateChanged(auth, user => {
    if (!user) log("⚠️ 로그인 안 됨 — 먼저 사이트에 로그인하세요.", "err");
    else log(`로그인 확인: ${user.email || user.uid}`, "ok");
});
</script>
</body>
</html>

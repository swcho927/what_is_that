<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 - 그 뭐냐 Judge</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="navbar.js"></script>
    <script type="module" src="firstblood.js"></script>
    <script>window.PROBLEMS = window.PROBLEMS || {};</script>
    <style>
        .profile-wrap { display:flex; justify-content:center; min-height:calc(100vh - 52px); margin-top:52px; padding:40px 20px; }
        .profile-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:550px; box-shadow:0 8px 32px rgba(0,0,0,0.24); height:fit-content; }
        .profile-header-ui { display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); padding-bottom:20px; margin-bottom:24px; }
        .profile-nickname { font-size:2.2rem; font-weight:900; color:var(--text); letter-spacing:-1px; }
        .tier-tag { font-size:1.3rem; font-weight:800; padding:6px 14px; background:rgba(255,255,255,0.05); border-radius:30px; border:1px solid currentColor; }
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:20px; }
        .stat-box { background:var(--bg-main); border:1px solid var(--border); border-radius:10px; padding:16px; }
        .stat-label { font-size:0.8rem; color:var(--text-muted); font-weight:700; margin-bottom:4px; }
        .stat-value { font-size:1.3rem; font-weight:800; color:var(--text); }
        .progress-section { margin-top:32px; }
        .progress-meta { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px; }
        .tier-side { display:flex; flex-direction:column; font-weight:bold; }
        .tier-side small { font-size:0.75rem; color:var(--text-muted); }
        .center-info { text-align:center; font-weight:bold; }
        .remain-text { font-size:0.8rem; color:#3fb950; margin-top:2px; font-weight:800; }
        .rating-bar-bg { width:100%; height:14px; background:#21262d; border-radius:10px; overflow:hidden; border:1px solid #30363d; }
        .rating-bar-fill { height:100%; width:0%; border-radius:10px; transition:width 1.2s cubic-bezier(0.4,0,0.2,1); }
        .solved-section { margin-top:32px; border-top:1px solid var(--border); padding-top:24px; }
        .solved-section-title { font-size:0.8rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:14px; }
        .solved-list { display:flex; flex-direction:column; gap:8px; }
        .solved-item { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg-main); border:1px solid var(--border); border-radius:8px; text-decoration:none; transition:background 0.15s; cursor:pointer; }
        .solved-item:hover { background:rgba(88,166,255,0.06); border-color:rgba(88,166,255,0.3); }
        .solved-num { font-size:0.78rem; color:var(--text-subtle); min-width:36px; font-variant-numeric:tabular-nums; }
        .solved-title { font-size:0.9rem; color:var(--text); font-weight:600; flex:1; }
        .solved-tier { font-size:0.72rem; font-weight:700; padding:2px 8px; border-radius:10px; border:1px solid currentColor; background:rgba(255,255,255,0.04); }
        .solved-empty { font-size:0.85rem; color:var(--text-subtle); text-align:center; padding:20px; }
        #loading { text-align:center; color:var(--text-muted); font-weight:bold; }
    </style>
</head>
<body>

<div id="topbar" class="topbar" data-subtitle="유저 프로필" data-ranking data-submissions></div>

<div class="profile-wrap">
    <div class="profile-card">
        <div id="loading">데이터 로드 중...</div>
        <div id="profile-content" style="display:none;">
            <div class="profile-header-ui">
                <div class="profile-nickname" id="prof-nickname">-</div>
                <div class="tier-tag" id="tier-name">-</div>
            </div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">🔥 레이팅</div>
                    <div class="stat-value" id="stat-rating">-</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">✅ 해결한 문제</div>
                    <div class="stat-value" id="stat-solved">-</div>
                </div>
                <div class="stat-box" style="grid-column:span 2;">
                    <div class="stat-label">📅 가입 일시</div>
                    <div class="stat-value" id="stat-date" style="font-size:1rem;color:var(--text-muted);">-</div>
                </div>
            </div>
            <div class="progress-section">
                <div class="progress-meta">
                    <div class="tier-side">
                        <span id="prog-curr-tier">-</span>
                        <small id="prog-curr-min">0점</small>
                    </div>
                    <div class="center-info">
                        <div><span id="prog-my-rating">0</span>점</div>
                        <div class="remain-text" id="prog-remain-text">-</div>
                    </div>
                    <div class="tier-side" style="text-align:right;">
                        <span id="prog-next-tier">-</span>
                        <small id="prog-next-min">0점</small>
                    </div>
                </div>
                <div class="rating-bar-bg">
                    <div class="rating-bar-fill" id="rating-bar"></div>
                </div>
                <div style="text-align:right;font-size:0.75rem;color:var(--text-muted);margin-top:5px;">
                    구간 진행도: <span id="progress-percent">0%</span>
                </div>
            </div>
            <div class="solved-section">
                <div class="solved-section-title">✅ 푼 문제</div>
                <div class="solved-list" id="solved-list"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { app }                                             from './firebase.js';
    import { normId, compareProbId }                           from './idalias.js';
    import { getAuth, onAuthStateChanged }                     from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
    import { getFirestore, doc, getDoc }                       from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

    const auth = getAuth(app);
    const db   = getFirestore(app);

    const REWARDS = {
        "Bronze V":1,"Bronze IV":2,"Bronze III":3,"Bronze II":4,"Bronze I":5,
        "Silver V":6,"Silver IV":8,"Silver III":10,"Silver II":12,"Silver I":14,
        "Gold V":15,"Gold IV":18,"Gold III":21,"Gold II":24,"Gold I":27,
        "Platinum V":32,"Platinum IV":36,"Platinum III":40,"Platinum II":44,"Platinum I":48,
        "Diamond V":60,"Diamond IV":65,"Diamond III":70,"Diamond II":75,"Diamond I":80,
        "Ruby V":100,"Ruby IV":110,"Ruby III":120,"Ruby II":130,"Ruby I":140
    };

    const TIERS = [
        {name:"Bronze V",min:0,color:"#cd7f32"},{name:"Bronze IV",min:40,color:"#cd7f32"},{name:"Bronze III",min:60,color:"#cd7f32"},{name:"Bronze II",min:80,color:"#cd7f32"},{name:"Bronze I",min:100,color:"#cd7f32"},
        {name:"Silver V",min:120,color:"#aaaaaa"},{name:"Silver IV",min:160,color:"#aaaaaa"},{name:"Silver III",min:200,color:"#aaaaaa"},{name:"Silver II",min:240,color:"#aaaaaa"},{name:"Silver I",min:280,color:"#aaaaaa"},
        {name:"Gold V",min:300,color:"#ddaa1c"},{name:"Gold IV",min:360,color:"#ddaa1c"},{name:"Gold III",min:420,color:"#ddaa1c"},{name:"Gold II",min:480,color:"#ddaa1c"},{name:"Gold I",min:540,color:"#ddaa1c"},
        {name:"Platinum V",min:640,color:"#00c8bb"},{name:"Platinum IV",min:720,color:"#00c8bb"},{name:"Platinum III",min:800,color:"#00c8bb"},{name:"Platinum II",min:880,color:"#00c8bb"},{name:"Platinum I",min:960,color:"#00c8bb"},
        {name:"Diamond V",min:1200,color:"#74bffd"},{name:"Diamond IV",min:1300,color:"#74bffd"},{name:"Diamond III",min:1400,color:"#74bffd"},{name:"Diamond II",min:1500,color:"#74bffd"},{name:"Diamond I",min:1600,color:"#74bffd"},
        {name:"Ruby V",min:2000,color:"#ff2d42"},{name:"Ruby IV",min:2200,color:"#ff2d42"},{name:"Ruby III",min:2400,color:"#ff2d42"},{name:"Ruby II",min:2600,color:"#ff2d42"},{name:"Ruby I",min:2800,color:"#ff2d42"}
    ];

    function getTierInfo(rating) {
        let idx = 0;
        for (let i = TIERS.length - 1; i >= 0; i--) { if (rating >= TIERS[i].min) { idx = i; break; } }
        return { curr: TIERS[idx], next: TIERS[idx + 1] || null };
    }

    function getTierColor(tier) {
        if (!tier) return '#8b949e';
        const found = TIERS.find(t => t.name === `${tier.name} ${tier.level}`);
        return found ? found.color : '#8b949e';
    }

    function loadScript(probId) {
        return new Promise(resolve => {
            if (window.PROBLEMS?.[probId]) { resolve(); return; }
            const s = document.createElement('script');
            s.src = `problems/${probId}.js`;
            s.onload = resolve;
            s.onerror = () => resolve();
            document.head.appendChild(s);
        });
    }

    function setText(id, text, color) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = text;
        if (color) el.style.color = color;
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) { alert("로그인이 필요합니다."); location.href = 'login.html'; return; }

        try {
            const targetUid = new URLSearchParams(location.search).get('uid') || user.uid;
            const snap = await getDoc(doc(db, "users", targetUid));

            if (!snap.exists()) { alert("존재하지 않는 유저입니다."); location.href = 'ranking.html'; return; }

            const data     = snap.data();
            const nickname = data.nickname || data.email || "익명";
            const solved   = [...new Set((data.solvedProblems || []).map(normId))];  // 옛 번호 → 새 번호

            await Promise.all(solved.map(loadScript));

            const rating = solved.reduce((sum, id) => {
                const p = window.PROBLEMS?.[id];
                return sum + (p?.tier ? (REWARDS[`${p.tier.name} ${p.tier.level}`] || 0) : 0);
            }, 0);

            const { curr, next } = getTierInfo(rating);
            const progress   = next ? (((rating - curr.min) / (next.min - curr.min)) * 100).toFixed(1) : 100;
            const remainText = next ? `+${next.min - rating}점 시 승급` : "최고 등급 달성 👑";
            const date       = data.joinedAt
                ? (data.joinedAt.toDate?.() ?? new Date(data.joinedAt)).toLocaleString('ko-KR', {timeZone:'Asia/Seoul'})
                : "-";

            setText('prof-nickname',    nickname);
            setText('tier-name',        curr.name,  curr.color);
            setText('stat-rating',      `${rating} 점`);
            setText('stat-solved',      `${solved.length} 개`);
            setText('stat-date',        date);
            setText('prog-curr-tier',   curr.name,  curr.color);
            setText('prog-curr-min',    `${curr.min}점`);
            setText('prog-next-tier',   next?.name ?? "MAX", next?.color ?? curr.color);
            setText('prog-next-min',    next ? `${next.min}점` : "");
            setText('prog-my-rating',   rating);
            setText('prog-remain-text', remainText);
            setText('progress-percent', progress + '%');

            const bar = document.getElementById('rating-bar');
            bar.style.backgroundColor = curr.color;
            setTimeout(() => { bar.style.width = (progress == 0 ? 1.5 : progress) + '%'; }, 100);

            const solvedList = document.getElementById('solved-list');
            if (solved.length === 0) {
                solvedList.innerHTML = '<div class="solved-empty">아직 푼 문제가 없어요.</div>';
            } else {
                [...solved].sort(compareProbId).forEach(id => {
                    const p     = window.PROBLEMS?.[id];
                    const color = p?.tier ? getTierColor(p.tier) : '#8b949e';
                    const tier  = p?.tier ? `${p.tier.name} ${p.tier.level}` : '?';
                    const title = p?.title || id;
                    const item  = document.createElement('div');
                    item.className = 'solved-item';
                    item.onclick   = () => location.href = `judge.html?prob=${id}`;
                    item.innerHTML =
                        `<span class="solved-num">${id}</span>` +
                        `<span class="solved-title">${title}</span>` +
                        `<span class="solved-tier" style="color:${color};border-color:${color};">${tier}</span>`;
                    solvedList.appendChild(item);
                });
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('profile-content').style.display = 'block';

        } catch(e) { console.error(e); alert("프로필 로드 중 오류가 발생했습니다."); }
    });
</script>

</body>
</html>

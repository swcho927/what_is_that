<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프로필 - 그 뭐냐 Judge</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 52px);
            margin-top: 52px;
            padding: 20px;
        }
        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.24);
        }
        .profile-header-ui {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 24px;
        }
        .profile-nickname {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -1px;
        }
        .tier-tag {
            font-size: 1.3rem;
            font-weight: 800;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid currentColor;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
        }
        .stat-box {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            text-align: left;
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
        }
        .progress-section {
            margin-top: 24px;
        }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: bold;
        }
        /* 🌟 [버그 수정 2] 게이지 바 컴포넌트 강제 노출을 위한 CSS 정밀 교정 */
        .rating-bar-bg {
            width: 100%;
            height: 14px;              /* 바 두께 확보 */
            background: #21262d;       /* 확실하게 눈에 띄는 배경색 부여 */
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #30363d;
            box-sizing: border-box;
        }
        .rating-bar-fill {
            height: 100%;
            width: 0%; 
            border-radius: 10px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #loading {
            text-align: center;
            color: var(--text-muted);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="topbar">
    <span class="topbar-brand" onclick="location.href='index.html'" style="cursor:pointer;">그 뭐냐 <span>Judge</span></span>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">유저 프로필 정보</span>
</div>

<div class="profile-wrap">
    <div class="profile-card">
        <div id="loading">유저 인증 세션 및 데이터 로드 중...</div>
        
        <div id="profile-content" style="display: none;">
            <div class="profile-header-ui">
                <div class="profile-nickname" id="prof-nickname">닉네임</div>
                <div class="tier-tag" id="tier-name">Bronze V</div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">🔥 현재 레이팅</div>
                    <div class="stat-value" id="stat-rating">0 점</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">✅ 해결한 문제 수</div>
                    <div class="stat-value" id="stat-solved">0 개</div>
                </div>
                <div class="stat-box" style="grid-column: span 2;">
                    <div class="stat-label">📅 가입 일시</div>
                    <div class="stat-value" id="stat-date" style="font-size:1rem; color:var(--text-muted)">-</div>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-meta">
                    <span>랭킹 진행도</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="rating-bar-bg">
                    <div class="rating-bar-fill" id="rating-bar"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey:            "AIzaSyASbcbiXA9SQ3bohWVK7w6xS74Y_RTZhaA",
        authDomain:        "what-is-that-3cc48.firebaseapp.com",
        projectId:         "what-is-that-3cc48",
        storageBucket:     "what-is-that-3cc48.firebasestorage.app",
        messagingSenderId: "745704527046",
        appId:             "1:745704527046:web:1ef97739fdc1348c96b3c7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const TIERS = [
        { name: "Bronze V",   min: 0,    color: "#ad5600" },
        { name: "Bronze IV",  min: 15,   color: "#ad5600" },
        { name: "Bronze III", min: 35,   color: "#ad5600" },
        { name: "Bronze II",  min: 60,   color: "#ad5600" },
        { name: "Bronze I",   min: 90,   color: "#ad5600" },
        
        { name: "Silver V",   min: 125,  color: "#435f7a" },
        { name: "Silver IV",  min: 165,  color: "#435f7a" },
        { name: "Silver III", min: 210,  color: "#435f7a" },
        { name: "Silver II",  min: 260,  color: "#435f7a" },
        { name: "Silver I",   min: 315,  color: "#435f7a" },
        
        { name: "Gold V",     min: 380,  color: "#ec9a00" },
        { name: "Gold IV",    min: 450,  color: "#ec9a00" },
        { name: "Gold III",   min: 530,  color: "#ec9a00" },
        { name: "Gold II",    min: 620,  color: "#ec9a00" },
        { name: "Gold I",     min: 720,  color: "#ec9a00" },
        
        { name: "Platinum V", min: 850,  color: "#27e2a4" },
        { name: "Platinum IV", min: 1000, color: "#27e2a4" },
        { name: "Platinum III", min: 1170, color: "#27e2a4" },
        { name: "Platinum II", min: 1360, color: "#27e2a4" },
        { name: "Platinum I",  min: 1570, color: "#27e2a4" },
        
        { name: "Diamond V",  min: 1820, color: "#00b4fc" },
        { name: "Diamond IV", min: 2100, color: "#00b4fc" },
        { name: "Diamond III", min: 2410, color: "#00b4fc" },
        { name: "Diamond II", min: 2750, color: "#00b4fc" },
        { name: "Diamond I",  min: 3120, color: "#00b4fc" },
        
        { name: "Ruby V",     min: 3600, color: "#ff0062" },
        { name: "Ruby IV",    min: 4150, color: "#ff0062" },
        { name: "Ruby III",   min: 4750, color: "#ff0062" },
        { name: "Ruby II",    min: 5400, color: "#ff0062" },
        { name: "Ruby I",     min: 6100, color: "#ff0062" }
    ];

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            alert("로그인이 필요합니다.");
            location.href = 'login.html';
            return;
        }

        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            let rating = 0;
            let nickname = user.displayName || "익명";
            let solvedCount = 0;
            let formattedDate = "-";

            if (userDoc.exists()) {
                const data = userDoc.data();
                rating = data.rating ?? 0;
                nickname = data.nickname || nickname;
                solvedCount = data.solvedProblems ? data.solvedProblems.length : 0;
                
                if (data.joinedAt) {
                    const dateObj = data.joinedAt.toDate ? data.joinedAt.toDate() : new Date(data.joinedAt);
                    formattedDate = dateObj.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
                }
            }

            let currentTier = TIERS[0];
            for (let i = TIERS.length - 1; i >= 0; i--) {
                if (rating >= TIERS[i].min) {
                    currentTier = TIERS[i];
                    break;
                }
            }

            document.getElementById('prof-nickname').textContent = nickname;
            document.getElementById('tier-name').textContent = currentTier.name;
            document.getElementById('tier-name').style.color = currentTier.color;
            document.getElementById('stat-rating').textContent = `${rating} 점`;
            document.getElementById('stat-solved').textContent = `${solvedCount} 개`;
            document.getElementById('stat-date').textContent = formattedDate;
            
            const progress = Math.min((rating / 6100) * 100, 100).toFixed(1);
            document.getElementById('progress-percent').textContent = progress + '%';
            
            const bar = document.getElementById('rating-bar');
            bar.style.backgroundColor = currentTier.color;
            // 확실하게 width가 채워지도록 스타일 바인딩 강제 집행
            setTimeout(() => { bar.style.width = progress + '%'; }, 100);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('profile-content').style.display = 'block';

        } catch (e) {
            console.error(e);
            alert("프로필 대시보드 로드 중 치명적인 오류가 발생했습니다.");
        }
    });
</script>
</body>
</html>

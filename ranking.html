<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>랭킹 - 그 뭐냐 Judge</title>
    <link rel="stylesheet" href="style.css">
    <script>window.PROBLEMS = window.PROBLEMS || {};</script>
    <style>
        /* 64px 탑바 확장 및 스크롤 여백 최적화 패치 */
        .topbar { 
            height: 64px !important; 
            padding: 0 24px !important; 
            display: flex; 
            align-items: center; 
            background: #161b22;
            border-bottom: 1px solid var(--border);
        }
        .topbar-btn-no-border { 
            border: none !important; 
            background: transparent !important; 
            box-shadow: none !important; 
            outline: none !important; 
            cursor: pointer; 
            color: var(--text-muted);
            font-weight: 600;
        }
        .topbar-btn-no-border:hover {
            color: var(--blue);
        }

        /* 랭킹 컨테이너 대형화 및 가운데 정렬 패치 */
        .ranking-wrap { 
            max-width: 1150px; 
            margin: 110px auto 50px auto; 
            padding: 0 30px; 
            box-sizing: border-box;
        }
        .ranking-title { 
            font-size: 2.2rem; 
            font-weight: 900; 
            color: var(--text); 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
        }

        /* 딥 블랙 & 다크 블루 계열 하이엔드 테이블 레이아웃 */
        .ranking-table { 
            width: 100%; 
            border-collapse: collapse; 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 14px; 
            overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            font-size: 1.05rem;
        }
        .ranking-table th, .ranking-table td { 
            padding: 18px 24px; 
            border-bottom: 1px solid var(--border); 
        }
        .ranking-table th { 
            background: rgba(255, 255, 255, 0.02); 
            color: var(--text-muted); 
            font-size: 0.95rem; 
            font-weight: 800; 
            text-transform: uppercase;
            text-align: center;
        }
        .ranking-table tbody tr:last-child td { 
            border-bottom: none; 
        }
        .ranking-table tbody tr:hover td { 
            background: rgba(88, 166, 255, 0.02); /* 부드러운 파란색 호버 라인 가속 */
        }

        /* 등수 필드 디자인 */
        .rank-num { 
            font-weight: 900; 
            font-size: 1.2rem; 
            text-align: center;
        }
        .rank-1 { color: #ffd700; font-size: 1.45rem; text-shadow: 0 0 10px rgba(255,215,0,0.2); }
        .rank-2 { color: #c0c0c0; font-size: 1.35rem; }
        .rank-3 { color: #cd7f32; font-size: 1.30rem; }
        
        /* 유저 정보 텍스트 필드 정렬 정의 */
        .rank-nick {
            text-align: left !important;
            padding-left: 40px !important;
        }
        .rank-nick a { 
            color: var(--text); 
            text-decoration: none; 
            font-weight: 700; 
            transition: color 0.2s;
        }
        .rank-nick a:hover { 
            color: var(--blue); 
            text-decoration: underline;
        }
        
        .rank-solved {
            font-weight: 700;
            color: var(--text-muted);
            text-align: center;
        }
        .rank-rating { 
            font-weight: 800; 
            color: var(--blue); 
            text-align: center;
        }
        .rank-tier-cell {
            text-align: center;
        }

        /* 티어 배지 컴팩트 캡슐화 */
        .tier-capsule {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 800;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid currentColor;
            letter-spacing: -0.3px;
        }

        #loading { 
            text-align: center; 
            color: var(--text-muted); 
            font-weight: bold;
            padding: 60px; 
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="topbar">
    <span class="topbar-brand" onclick="location.href='index.html'" style="cursor:pointer;">그 뭐냐 <span>Judge</span></span>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">실시간 전적</span>
    <button class="topbar-btn topbar-btn-no-border" onclick="location.href='ranking.html'" style="margin-left: 10px;">랭킹</button>
    
    <div style="margin-left:auto; display:flex; align-items:center; gap:10px;">
        <span id="user-info" style="display:none; font-size:0.82rem; color:var(--text-muted);"></span>
        <button id="btn-login"  class="topbar-btn" onclick="location.href='login.html'">로그인</button>
        <button id="btn-signup" class="topbar-btn topbar-btn-primary" onclick="location.href='signup.html'">회원가입</button>
        <button id="btn-logout" class="topbar-btn" style="display:none;">로그아웃</button>
    </div>
</div>

<div class="ranking-wrap">
    <div class="ranking-title">🏆 전적 랭킹</div>
    <div id="loading">모든 계정의 실시간 데이터를 집계하는 중...</div>
    
    <table class="ranking-table" id="ranking-table" style="display:none;">
        <thead>
            <tr>
                <th style="width: 12%;">등수</th>
                <th style="width: 38%; text-align: left; padding-left: 40px;">닉네임</th>
                <th style="width: 20%;">티어</th>
                <th style="width: 15%;">푼 문제 수</th> <th style="width: 15%;">레이팅</th>
            </tr>
        </thead>
        <tbody id="ranking-body"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp }       from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
    import { getFirestore, collection, getDocs }    from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyASbcbiXA9SQ3bohWVK7w6xS74Y_RTZhaA", 
        authDomain: "what-is-that-3cc48.firebaseapp.com",
        projectId: "what-is-that-3cc48", 
        storageBucket: "what-is-that-3cc48.firebasestorage.app",
        messagingSenderId: "745704527046", 
        appId: "1:745704527046:web:1ef97739fdc1348c96b3c7"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const REWARDS = {
        "Bronze V":1,"Bronze IV":2,"Bronze III":3,"Bronze II":4,"Bronze I":5,
        "Silver V":6,"Silver IV":8,"Silver III":10,"Silver II":12,"Silver I":14,
        "Gold V":15,"Gold IV":18,"Gold III":21,"Gold II":24,"Gold I":27,
        "Platinum V":32,"Platinum IV":36,"Platinum III":40,"Platinum II":44,"Platinum I":48,
        "Diamond V":60,"Diamond IV":65,"Diamond III":70,"Diamond II":75,"Diamond I":80,
        "Ruby V":100,"Ruby IV":110,"Ruby III":120,"Ruby II":130,"Ruby I":140
    };

    const TIERS = [
        {name:"Bronze V",min:0,color:"#ad5600"},{name:"Bronze IV",min:40,color:"#ad5600"},{name:"Bronze III",min:60,color:"#ad5600"},{name:"Bronze II",min:80,color:"#ad5600"},{name:"Bronze I",min:100,color:"#ad5600"},
        {name:"Silver V",min:120,color:"#435f7a"},{name:"Silver IV",min:160,color:"#435f7a"},{name:"Silver III",min:200,color:"#435f7a"},{name:"Silver II",min:240,color:"#435f7a"},{name:"Silver I",min:280,color:"#435f7a"},
        {name:"Gold V",min:300,color:"#ec9a00"},{name:"Gold IV",min:360,color:"#ec9a00"},{name:"Gold III",min:420,color:"#ec9a00"},{name:"Gold II",min:480,color:"#ec9a00"},{name:"Gold I",min:540,color:"#ec9a00"},
        {name:"Platinum V",min:640,color:"#27e2a4"},{name:"Platinum IV",min:720,color:"#27e2a4"},{name:"Platinum III",min:800,color:"#27e2a4"},{name:"Platinum II",min:880,color:"#27e2a4"},{name:"Platinum I",min:960,color:"#27e2a4"},
        {name:"Diamond V",min:1200,color:"#00b4fc"},{name:"Diamond IV",min:1300,color:"#00b4fc"},{name:"Diamond III",min:1400,color:"#00b4fc"},{name:"Diamond II",min:1500,color:"#00b4fc"},{name:"Diamond I",min:1600,color:"#00b4fc"},
        {name:"Ruby V",min:2000,color:"#ff0062"},{name:"Ruby IV",min:2200,color:"#ff0062"},{name:"Ruby III",min:2400,color:"#ff0062"},{name:"Ruby II",min:2600,color:"#ff0062"},{name:"Ruby I",min:2800,color:"#ff0062"}
    ];

    function getTier(rating) {
        let tier = TIERS[0];
        for (let i = TIERS.length - 1; i >= 0; i--) { if (rating >= TIERS[i].min) { tier = TIERS[i]; break; } }
        return tier;
    }

    function loadScript(probId) {
        return new Promise(resolve => {
            if (window.PROBLEMS?.[probId]) { resolve(); return; }
            const s = document.createElement('script');
            s.src = `problems/${probId}.js`;
            s.onload = resolve;
            s.onerror = () => resolve();
            document.head.appendChild(s);
        });
    }

    onAuthStateChanged(auth, (user) => {
        const userInfo  = document.getElementById('user-info');
        const btnLogin  = document.getElementById('btn-login');
        const btnSignup = document.getElementById('btn-signup');
        const btnLogout = document.getElementById('btn-logout');
        if (user) {
            const name = user.displayName || user.email || "유저";
            userInfo.innerHTML = `<a href="profile.html" style="color:var(--blue);text-decoration:none;font-weight:bold;">${name}</a>`;
            userInfo.style.display = 'inline-block';
            btnLogin.style.display  = 'none';
            btnSignup.style.display = 'none';
            btnLogout.style.display = 'inline-block';
        } else {
            userInfo.style.display  = 'none';
            btnLogin.style.display  = 'inline-block';
            btnSignup.style.display = 'inline-block';
            btnLogout.style.display = 'none';
        }
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
        signOut(auth).then(() => location.href = 'index.html');
    });

    async function loadRanking() {
        try {
            const snap = await getDocs(collection(db, "users"));
            const users = [];

            const allSolved = new Set();
            snap.forEach(d => (d.data().solvedProblems || []).forEach(id => allSolved.add(id)));
            await Promise.all([...allSolved].map(loadScript));

            snap.forEach(d => {
                const data   = d.data();
                const solved = data.solvedProblems || [];
                const rating = solved.reduce((sum, id) => {
                    const p = window.PROBLEMS?.[id];
                    return sum + (p?.tier ? (REWARDS[`${p.tier.name} ${p.tier.level}`] || 0) : 0);
                }, 0);
                
                // 🌟 객체 바인딩 구조에 해결한 문제 수 카운트 추가
                users.push({ 
                    uid: d.id, 
                    nickname: data.nickname || data.email || "익명", 
                    rating,
                    solvedCount: solved.length 
                });
            });

            users.sort((a, b) => b.rating - a.rating);

            const tbody = document.getElementById('ranking-body');
            users.forEach((u, i) => {
                const tier     = getTier(u.rating);
                const rankNum  = i + 1;
                const rankClass = rankNum <= 3 ? `rank-${rankNum}` : '';
                const medal    = rankNum === 1 ? '🥇' : rankNum === 2 ? '🥈' : rankNum === 3 ? '🥉' : rankNum;
                
                const tr = document.createElement('tr');
                // 🌟 푼 문제 수(u.solvedCount) 열 레이아웃 동적 렌더링 주입
                tr.innerHTML =
                    `<td class="rank-num ${rankClass}">${medal}</td>
                     <td class="rank-nick"><a href="profile.html?uid=${u.uid}">${u.nickname}</a></td>
                     <td class="rank-tier-cell"><span class="tier-capsule" style="color:${tier.color};">${tier.name}</span></td>
                     <td class="rank-solved">${u.solvedCount}개</td>
                     <td class="rank-rating">${u.rating}점</td>`;
                tbody.appendChild(tr);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('ranking-table').style.display = 'table';

        } catch(e) { console.error(e); document.getElementById('loading').textContent = "랭킹 로드 실패"; }
    }

    loadRanking();
</script>
</body>
</html>

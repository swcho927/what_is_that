<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숏코딩 랭킹 - 그 뭐냐 Judge</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="navbar.js"></script>
    <script type="module" src="firstblood.js"></script>
    <script>window.PROBLEMS = window.PROBLEMS || {};</script>
    <style>
        .ranking-wrap { max-width: 1100px; margin: 80px auto 40px; padding: 0 20px; }
        .ranking-title { font-size: 1.5rem; font-weight: 800; color: var(--text); margin-bottom: 6px; }
        .ranking-desc { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; }
        .ranking-table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .ranking-table th { background: rgba(48,54,61,0.5); color: var(--text-subtle); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 16px; border-bottom: 1px solid var(--border); text-align: left; }
        .ranking-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .ranking-table tr:last-child td { border-bottom: none; }
        .ranking-table tr:hover td { background: rgba(88,166,255,0.04); }
        .rank-num { font-weight: 800; color: var(--text-subtle); width: 50px; }
        .rank-1 { color: #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        .rank-nick a { color: var(--text); text-decoration: none; font-weight: 600; }
        .rank-nick a:hover { color: var(--blue); }
        .rank-rating { font-weight: 700; color: var(--text); }
        #loading { text-align: center; color: var(--text-muted); padding: 40px; }
        #empty { text-align: center; color: var(--text-muted); padding: 40px; display: none; }
    </style>
</head>
<body>

<div id="topbar" class="topbar" data-subtitle="숏코딩 랭킹" data-ranking data-submissions></div>

<div class="ranking-wrap">
    <div class="ranking-title">✂️ 숏코딩 랭킹</div>
    <div class="ranking-desc">각 문제에서 가장 짧은 코드(byte)로 정답을 맞힌 사람에게 1점. 동점 길이면 공동 1점. 점수 합산 순위입니다.</div>
    <div id="loading">숏코딩 랭킹 불러오는 중...</div>
    <div id="empty">아직 집계할 정답 기록이 없습니다.</div>
    <table class="ranking-table" id="ranking-table" style="display:none;">
        <thead>
            <tr>
                <th>순위</th>
                <th>닉네임</th>
                <th>숏코딩 점수</th>
            </tr>
        </thead>
        <tbody id="ranking-body"></tbody>
    </table>
</div>

<script type="module">
    import { app }                                                   from './firebase.js';
    import { computeShortcoding }                                    from './shortcoding.js';
    import { getFirestore, collection, getDocs, query, where }       from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

    const db = getFirestore(app);

    function esc(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    async function load() {
        try {
            const snap = await getDocs(query(collection(db, "submissions"), where("success", "==", true)));
            const subs = [];
            snap.forEach(d => subs.push(d.data()));

            const board = computeShortcoding(subs);

            document.getElementById('loading').style.display = 'none';
            if (board.length === 0) { document.getElementById('empty').style.display = 'block'; return; }

            const tbody = document.getElementById('ranking-body');
            board.forEach((u, i) => {
                const rankNum   = i + 1;
                const rankClass = rankNum <= 3 ? `rank-${rankNum}` : '';
                const medal     = rankNum === 1 ? '🥇' : rankNum === 2 ? '🥈' : rankNum === 3 ? '🥉' : rankNum;
                const tr = document.createElement('tr');
                tr.innerHTML =
                    `<td class="rank-num ${rankClass}">${medal}</td>
                     <td class="rank-nick"><a href="profile.html?uid=${esc(u.uid)}">${esc(u.nickname)}</a></td>
                     <td class="rank-rating">${u.points}점</td>`;
                tbody.appendChild(tr);
            });
            document.getElementById('ranking-table').style.display = 'table';
        } catch(e) {
            console.error(e);
            document.getElementById('loading').textContent = "숏코딩 랭킹 로드 실패: " + e.message;
        }
    }

    load();
</script>

</body>
</html>

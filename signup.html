<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 그 뭐냐 Judge</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 52px);
            margin-top: 52px;
        }
        .auth-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 36px 40px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 4px;
        }
        .auth-subtitle {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: -8px;
        }
        .auth-btn {
            width: 100%;
            padding: 11px;
            border-radius: 7px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }
        .auth-btn-google {
            background: var(--bg-main);
            color: var(--text);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .auth-btn-google:hover {
            border-color: var(--blue);
            color: var(--blue);
        }
        /* 🎨 새롭게 정의된 이쁜 입력 필드 스타일 */
        .auth-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .auth-input-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text);
        }
        .auth-input {
            width: 100%;
            padding: 11px;
            border-radius: 7px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.15s;
        }
        .auth-input:focus {
            border-color: var(--blue);
        }
        .auth-btn-submit {
            background: var(--blue);
            color: #ffffff;
            margin-top: 8px;
        }
        .auth-btn-submit:hover {
            opacity: 0.9;
        }
        .auth-error {
            color: var(--red);
            font-size: 0.82rem;
            display: none;
        }
        .auth-link {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .auth-link a {
            color: var(--blue);
            text-decoration: none;
        }
        .auth-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="topbar">
    <span class="topbar-brand" onclick="location.href='index.html'" style="cursor:pointer;">그 뭐냐 <span>Judge</span></span>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">그 뭐냐 언어 온라인 채점 사이트</span>
</div>

<div class="auth-wrap">
    <div class="auth-box">
        <div>
            <div class="auth-title">회원가입</div>
            <div class="auth-subtitle" id="auth-sub-text">구글 계정으로 연동하여 가입하세요</div>
        </div>

        <div id="error-msg" class="auth-error"></div>

        <div id="step-auth">
            <button class="auth-btn auth-btn-google" onclick="signUpGoogle()">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                구글 계정으로 가입
            </button>
            <div class="auth-link" style="margin-top: 16px;">이미 계정이 있으신가요? <a href="login.html">로그인</a></div>
        </div>

        <div id="step-info" style="display: none; display: flex; flex-direction: column; gap: 16px;">
            <div class="auth-input-group">
                <label class="auth-input-label">이름</label>
                <input type="text" id="reg-name" class="auth-input" placeholder="실명을 입력하세요">
            </div>
            
            <div class="auth-input-group">
                <label class="auth-input-label">닉네임</label>
                <input type="text" id="reg-nickname" class="auth-input" placeholder="사이트에서 사용할 닉네임">
            </div>

            <div class="auth-input-group">
                <label class="auth-input-label">생년월일</label>
                <input type="date" id="reg-birth" class="auth-input">
            </div>

            <button class="auth-btn auth-btn-submit" onclick="completeSignUp()">가입 완료하기</button>
        </div>

    </div>
</div>

<script type="module">
    import { initializeApp }                                      from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, 
             signOut, updateProfile, getAdditionalUserInfo }     from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey:            "AIzaSyASbcbiXA9SQ3bohWVK7w6xS74Y_RTZhaA",
        authDomain:        "what-is-that-3cc48.firebaseapp.com",
        projectId:         "what-is-that-3cc48",
        storageBucket:     "what-is-that-3cc48.firebasestorage.app",
        messagingSenderId: "745704527046",
        appId:             "1:745704527046:web:1ef97739fdc1348c96b3c7",
        measurementId:     "G-YKN1NFTZRM"
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' }); // 여기도 팝업 고정 옵션 장착!

    function showError(msg) {
        var el = document.getElementById('error-msg');
        el.textContent = msg;
        el.style.display = 'block';
    }

    // 1단계: 구글 버튼 누를 때
    window.signUpGoogle = async function() {
        try {
            document.getElementById('error-msg').style.display = 'none';
            const result = await signInWithPopup(auth, provider);
            const additionalInfo = getAdditionalUserInfo(result);

            // 🚨 이미 가입된 기존 유저가 회원가입 창에 왔을 때
            if (additionalInfo && !additionalInfo.isNewUser) {
                alert("이미 가입된 계정입니다! 로그인 페이지로 이동합니다.");
                location.href = 'login.html';
                return;
            }

            // 🎉 신규 유저라면 입력 창으로 폼 전환
            document.getElementById('auth-sub-text').textContent = "그 뭐냐 Judge에 오신 것을 환영합니다! 상세 정보를 입력해 주세요.";
            document.getElementById('step-auth').style.display = 'none';
            document.getElementById('step-info').style.display = 'flex';

        } catch(e) {
            showError('구글 인증 실패: ' + e.message);
        }
    };

    // 2단계: 최종 가입하기 버튼 누를 때
    window.completeSignUp = async function() {
        const name     = document.getElementById('reg-name').value.trim();
        const nickname = document.getElementById('reg-nickname').value.trim();
        const birth    = document.getElementById('reg-birth').value;

        // 벨리데이션 체크
        if (!name || !nickname || !birth) {
            alert("그 뭐냐... 모든 정보를 전부 입력해 주셔야 가입이 끝납니다!");
            return;
        }

        try {
            // 파이어베이스 인증 프로필에 유저가 정한 '닉네임' 심어주기
            await updateProfile(auth.currentUser, {
                displayName: nickname
            });

            // 💡 [참고] 이름과 생년월일 데이터는 나중에 파이어베이스 Database(Firestore 등)를 
            // 연결한 뒤 유저 테이블에 완전히 때려 박으면 됩니다. 우선 지금은 세션 성공 후 메인으로 보냅니다.
            alert(`${nickname}님, 가입 정보가 성공적으로 등록되었습니다! 🎉`);
            location.href = 'index.html';

        } catch(e) {
            alert('가입 처리 중 오류 발생: ' + e.message);
        }
    };
</script>

</body>
</html>
